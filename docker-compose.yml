version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: hexmon-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hexmon
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: hexmon-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hexmon-api
    environment:
      NODE_ENV: development
      PORT: 3000
      DEVICE_PORT: 8443
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hexmon
      JWT_SECRET: your-secret-key-min-32-chars-long-here-dev
      JWT_EXPIRY: 900
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: 'false'
      MINIO_REGION: us-east-1
      ADMIN_EMAIL: admin@hexmon.local
      ADMIN_PASSWORD: ChangeMe123!
      LOG_LEVEL: info
    ports:
      - '3000:3000'
      - '8443:8443'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

volumes:
  postgres_data:
  minio_data:

